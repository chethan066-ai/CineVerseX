{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>Edit Movie</h2>

    <form method="POST">

        <input
            type="text"
            name="title"
            value="{{ movie.title }}"
            class="form-control mb-3"
        >

        <textarea
            name="description"
            class="form-control mb-3"
        >{{ movie.description }}</textarea>

        <input
            type="text"
            name="language"
            value="{{ movie.language }}"
            class="form-control mb-3"
        >

        <label class="form-label">Genre</label>
        <select name="genre" class="form-control mb-3" required>
            {% for g in genres %}
                <option value="{{ g }}" {% if movie.genre == g %}selected{% endif %}>
                    {{ g }}
                </option>
            {% endfor %}
        </select>

        <input
            type="text"
            name="release_date"
            value="{{ movie.release_date }}"
            class="form-control mb-3"
        >

        <input
            type="number"
            step="0.1"
            name="rating"
            value="{{ movie.rating }}"
            class="form-control mb-3"
        >

        <label class="form-label">Poster URL</label>
        <input
            type="url"
            name="poster_url"
            value="{{ movie.poster_url or '' }}"
            class="form-control mb-3"
            placeholder="https://image.example/poster.jpg">

        <label class="form-label">Backdrop URL</label>
        <input
            type="url"
            name="backdrop_url"
            value="{{ movie.backdrop_url or '' }}"
            class="form-control mb-3"
            placeholder="https://image.example/backdrop.jpg">

        <label class="form-label">Interested Count</label>
        <input
            type="number"
            min="0"
            step="1"
            name="interested_count"
            value="{{ movie.interested_count or 0 }}"
            class="form-control mb-3">

        <label class="form-label">Release Status</label>
        <select name="release_status" class="form-control mb-3">
            {% for status in ["Coming Soon", "Now Showing", "Released"] %}
            <option value="{{ status }}" {% if (movie.release_status or "Coming Soon") == status %}selected{% endif %}>
                {{ status }}
            </option>
            {% endfor %}
        </select>

        <label class="form-label">YouTube Trailer URL</label>
        <input
            type="url"
            name="trailer_url"
            value="{{ trailer_watch_url or movie.trailer_url or '' }}"
            class="form-control mb-3"
            placeholder="https://www.youtube.com/watch?v=xxxx">

        <label class="form-label">JustWatch URL</label>
        <input
            type="url"
            name="justwatch_url"
            value="{{ movie.justwatch_url or '' }}"
            class="form-control mb-3"
            placeholder="https://www.justwatch.com/in/movie/example">

        <label class="form-label">BookMyShow URL</label>
        <input
            type="url"
            name="bookmyshow_url"
            value="{{ movie.bookmyshow_url or '' }}"
            class="form-control mb-3"
            placeholder="https://in.bookmyshow.com/">

        <button class="btn btn-success">
            Update Movie
        </button>

    </form>

</div>

{% endblock %}
